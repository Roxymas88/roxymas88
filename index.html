let activeCat = "Semua", query = "";

function render(){
  const filtered = products.filter(p=>{
    const matchCat = activeCat==="Semua"||p.cat===activeCat;
    const matchQ = p.name.toLowerCase().includes(query.toLowerCase())||p.cat.toLowerCase().includes(query.toLowerCase());
    return matchCat&&matchQ;
  });
  document.getElementById("count").textContent = filtered.length+" produk ditemukan";
  document.getElementById("grid").innerHTML = filtered.map(p=>`
    <div class="card">
      <div class="card-img">${p.icon}</div>
      <div class="card-body">
        <span class="card-cat">${p.cat}</span>
        <span class="card-name">${p.name}</span>
        <a class="card-btn" href="${p.url}" target="_blank" rel="noopener">Lihat di Shopee →</a>
      </div>
    </div>
  `).join("");
}

const filterBar = document.getElementById("filters");
cats.forEach(c=>{
  const btn = document.createElement("button");
  btn.className = "filter-btn"+(c==="Semua"?" active":"");
  btn.textContent = c;
  btn.onclick = ()=>{
    activeCat = c;
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    render();
  };
  filterBar.appendChild(btn);
});

document.getElementById("search").addEventListener("input",e=>{
