{name:"No.98 Gantungan Panci Serba Guna",cat:"Dapur",price:"Rp88.900",img:BASE+"gantungan-panci.jpg",url:"https://s.shopee.co.id/4qCpJENWvt"},
{name:"No.99 Sliding Hook Stop Kontak",cat:"Dapur",price:"Rp1.800",img:BASE+"sliding-hook.jpg",url:"https://s.shopee.co.id/70HJtF2eLJ"},
];
const icons={Kucing:"🐱",Elektronik:"📱",Rumah:"🏠",Dekorasi:"✨",Fashion:"👗",Aksesori:"💍",Otomotif:"🛵",Outdoor:"🏕️",Kecantikan:"💄",Edukasi:"📚",Dapur:"🍳"};
const cats=["Semua",...[...new Set(products.map(p=>p.cat))]];
let activeCat="Semua",query="";
function cardHTML(p){
const imgEl=p.img
?`<img class="card-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=card-placeholder>${icons[p.cat]||"🛍️"}</div>'">`
:`<div class="card-placeholder">${icons[p.cat]||"🛍️"}</div>`;
return `<div class="card">${imgEl}<div class="card-body"><span class="card-cat">${p.cat}</span><span class="card-name">${p.name}</span><span class="card-price">${p.price}</span><a class="card-btn" href="${p.url}" target="_blank" rel="noopener">Lihat di Shopee →</a></div></div>`;
}
function render(){
const f=products.filter(p=>(activeCat==="Semua"||p.cat===activeCat)&&(p.name.toLowerCase().includes(query.toLowerCase())||p.cat.toLowerCase().includes(query.toLowerCase())));
document.getElementById("count").textContent=f.length+" produk ditemukan";
document.getElementById("grid").innerHTML=f.map(cardHTML).join("");
}
const fb=document.getElementById("filters");
cats.forEach(c=>{
const b=document.createElement("button");
b.className="filter-btn"+(c==="Semua"?" active":"");
b.textContent=c;
b.onclick=()=>{
activeCat=c;
document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
render();
};
fb.appendChild(b);
});
document.getElementById("search").addEventListener("input",e=>{query=e.target.value;render();});
render();
</script>
</body>
</html>
