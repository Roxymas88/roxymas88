const icons={Kucing:"🐱",Elektronik:"📱",Rumah:"🏠",Dekorasi:"✨",Fashion:"👗",Aksesori:"💍",Otomotif:"🛵",Outdoor:"🏕️",Kecantikan:"💄",Edukasi:"📚",Dapur:"🍳"};
const cats=["Semua",...[...new Set(products.map(p=>p.cat))]];
let activeCat="Semua",query="";
 
const shopeeIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>`;
 
function priceHTML(p){
  if(p.price) return `<span class="card-price">${p.price}</span>`;
  return `<a class="card-price-link" href="${p.url}" target="_blank" rel="noopener">${shopeeIcon} Cek Harga</a>`;
}
 
function cardHTML(p){
  const imgEl=p.img
    ?`<img class="card-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=card-placeholder>${icons[p.cat]||"🛍️"}</div>'">`
    :`<div class="card-placeholder">${icons[p.cat]||"🛍️"}</div>`;
  return `<div class="card">${imgEl}<div class="card-body"><span class="card-cat">${p.cat}</span><span class="card-name">${p.name}</span>${priceHTML(p)}<a class="card-btn" href="${p.url}" target="_blank" rel="noopener">Lihat di Shopee →</a></div></div>`;
}
 
function render(){
  const f=products.filter(p=>(activeCat==="Semua"||p.cat===activeCat)&&(p.name.toLowerCase().includes(query.toLowerCase())||p.cat.toLowerCase().includes(query.toLowerCase())));
  document.getElementById("count").textContent=f.length+" produk ditemukan";
  document.getElementById("grid").innerHTML=f.map(cardHTML).join("");
}
 
const fb=document.getElementById("filters");
cats.forEach(c=>{
  const b=document.createElement("button");
  b.className="filter-btn"+(c==="Semua"?" active":"");
  b.textContent=c;
  b.onclick=()=>{
    activeCat=c;
    document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
  fb.appendChild(b);
});
 
document.getElementById("search").addEventListener("input",e=>{query=e.target.value;render();});
render();
</script>
